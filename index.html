<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sermon Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="css/styles.css">
  
  <!-- Progressive Web App Settings -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0F1218">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Sermon Notes">
  <link rel="apple-touch-icon" href="./assets/icon-192-v2.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./assets/icon-192-v2.png">
  <link rel="icon" type="image/png" sizes="512x512" href="./assets/icon-512-v2.png">
</head>
<body>
  <!-- Bible Picker Modal -->
  <div id="bible-picker-modal" class="modal-overlay hidden">
    <div class="bible-picker-container">
      <div class="bible-picker-header">
        <button type="button" class="btn-icon" onclick="window.biblePickerBack()" id="bible-picker-back">
          <i class="ph-bold ph-arrow-left"></i>
        </button>
        <span id="bible-picker-breadcrumb" class="bible-picker-breadcrumb">Books</span>
        <button type="button" class="btn-icon" onclick="window.closeBiblePicker()">
          <i class="ph-bold ph-x"></i>
        </button>
      </div>
      <div id="bible-picker-grid" class="bible-grid"></div>
      <div class="bible-picker-footer hidden" id="bible-picker-footer">
        <button type="button" class="btn-primary full-width" onclick="window.finalizeVerseSelection()">Done</button>
      </div>
    </div>
  </div>

  <div class="app-container">
    <header class="top-bar">
      <div class="top-bar-left" style="display: flex; align-items: center; gap: 0.5rem;">
        <button class="btn-icon" id="btn-back-sermons" onclick="switchView('list')" title="Back to Sermons" style="display: none;">
          <i class="ph-bold ph-arrow-left"></i>
        </button>
        <h1 id="app-title">New Note</h1>
      </div>
      <div class="top-actions">
        <span class="save-indicator" id="save-indicator">Saved</span>
        <button class="btn-icon" id="btn-delete-note" onclick="deleteCurrentNote()" title="Delete Note" style="color: var(--danger-color); display: none;">
          <i class="ph-bold ph-trash"></i>
        </button>
        <button class="btn-icon" id="btn-finalize-note" onclick="finalizeNote()" title="Finalize Note" style="color: var(--accent-primary); display: none;">
          <i class="ph-fill ph-check-circle"></i>
        </button>
        <button class="btn-icon" id="btn-new-note" onclick="createNewNote()" title="Start New Note">
          <i class="ph-bold ph-plus"></i>
        </button>
        <button class="btn-icon" id="btn-logout" onclick="window.signOutAction()" title="Sign Out">
          <i class="ph-bold ph-sign-out"></i>
        </button>
      </div>
    </header>

    <main class="content-area">
      
      <!-- Auth View -->
      <section id="auth-view" class="view" style="justify-content: center; align-items: center; text-align: center;">
        <i class="ph-fill ph-books" style="font-size: 5rem; color: var(--accent-primary); margin-bottom: 1.5rem;"></i>
        <h2 style="font-size: 2rem; margin-bottom: 0.5rem;">Sermon Notes</h2>
        <p style="color: var(--text-secondary); margin-bottom: 2rem; max-width: 80%;">Securely sync your library exactly across your devices.</p>
        <button class="btn-primary" onclick="window.signInAction()" style="padding: 1rem 2rem; display: flex; align-items: center; gap: 0.75rem; border-radius: 999px;">
          <i class="ph-fill ph-google-logo" style="font-size: 1.25rem;"></i> Sign in with Google
        </button>
      </section>

      <!-- Editor View -->
      <section id="editor-view" class="view">
        <form id="note-form" onsubmit="event.preventDefault();" style="display: flex; flex-direction: column; height: 100%;">
          <!-- Metadata Section -->
            <div class="card meta-section" style="flex-shrink: 0; margin-bottom: 0; padding-bottom: 0.5rem;">
            <div class="metadata-header" onclick="toggleMetadata()" style="display: flex; justify-content: center; cursor: pointer; align-items: center; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border-color); margin-bottom: 0.5rem;">
              <i id="metadata-chevron" class="ph-bold ph-caret-up" style="color: var(--text-secondary); transition: transform 0.2s; font-size: 1.25rem;"></i>
            </div>
            <div id="metadata-body" class="metadata-body">
              <input type="text" id="note-title" class="input-title" placeholder="Sermon Title" autocomplete="off">
              <div class="input-row" style="margin-top: 0.5rem;">
                <div class="input-group">
                  <i class="ph ph-user"></i>
                  <input type="text" id="note-speaker" placeholder="Speaker" autocomplete="off">
                </div>
                <div class="input-group">
                  <i class="ph ph-calendar-blank"></i>
                  <input type="date" id="note-date">
                </div>
              </div>
              <div class="input-group" id="add-scripture-wrapper" style="margin-top: 0.5rem;">
                <button type="button" id="btn-open-bible-picker" class="btn-primary full-width" onclick="window.openBiblePicker()">
                  <i class="ph-bold ph-book-open-text"></i> Add Scripture
                </button>
              </div>
              
              <div id="anchor-scripture-container" class="scripture-card hidden" style="margin-top: 0.5rem;">
                <div id="scripture-header" class="scripture-header" onclick="window.toggleScripture()">
                  <div class="scripture-header-left">
                    <span class="book-icon" onclick="window.editScripture(event)" title="Edit Scripture">📖</span>
                    <span id="citation-text" class="citation-text"></span>
                  </div>
                  <i id="scripture-chevron" class="ph-bold ph-caret-down chevron-icon"></i>
                </div>
                <div id="scripture-body" class="scripture-body hidden"></div>
              </div>

            <div class="series-container" id="series-container">
              <button type="button" class="btn-text-muted" onclick="toggleSeriesInput()" id="btn-add-series">
                <i class="ph ph-list-plus"></i> Add to Series
              </button>
              <div class="series-input-wrapper hidden" id="series-input-wrapper">
                <div class="input-group">
                  <i class="ph ph-books"></i>
                  <input type="text" id="note-series" placeholder="Series Title" autocomplete="off">
                </div>
              </div>
            </div>
            </div>
          </div>

          <!-- Note Content -->
          <div class="card content-section">
            <div id="editor-toolbar" class="editor-toolbar">
              <button class="toolbar-btn" type="button" onclick="formatText('bold')" title="Bold (Ctrl+B)">
                <i class="ph-bold ph-text-b"></i>
              </button>
              <button class="toolbar-btn" type="button" onclick="formatText('italic')" title="Italic (Ctrl+I)">
                <i class="ph-bold ph-text-italic"></i>
              </button>
              <button class="toolbar-btn" type="button" onclick="formatText('underline')" title="Underline (Ctrl+U)">
                <i class="ph-bold ph-text-underline"></i>
              </button>
            </div>
            <div id="note-content" class="free-form-textarea rich-text-editor" contenteditable="true" data-placeholder="Start typing your notes here..."></div>
          </div>
        </form>
        <!-- Spacer for bottom padding due to nav -->
        <div class="bottom-spacer"></div>
      </section>

      <!-- List View -->
      <section id="list-view" class="view hidden">
        <div class="list-controls">
          <div class="search-box">
            <i class="ph ph-magnifying-glass"></i>
            <input type="text" id="search-input" placeholder="Search notes..." autocomplete="off">
          </div>
          <div class="sort-controls">
            <select id="sort-select" onchange="changeSortMode(event)">
              <option value="chronological">Date (Newest)</option>
              <option value="series">By Series</option>
            </select>
          </div>
        </div>
        <div id="notes-container" class="notes-grid">
          <!-- Note cards go here -->
        </div>
        
        <div id="empty-state" class="empty-state hidden">
          <i class="ph-fill ph-notebook"></i>
          <p>No notes yet.</p>
          <button class="btn-primary" onclick="createNewNote()">Start Writing</button>
        </div>
      </section>

    </main>
  </div>


  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(registration => console.log('ServiceWorker registration successful'))
          .catch(err => console.error('ServiceWorker registration failed: ', err));
      });
    }
  </script>

</body>
</html>
